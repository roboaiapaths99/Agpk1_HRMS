version: '3.8'

services:
  # Backend API
  backend:
    build: .
    container_name: hr_system_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/hr_system
      - REDIS_URL=redis://redis:6379
      - DEBUG=true
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - hr_network
    restart: unless-stopped

  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: hr_system_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=hr_system
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - hr_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hr_system_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hr_network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: hr_system_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - hr_network
    restart: unless-stopped

  # Celery Worker (Background Tasks)
  celery_worker:
    build: .
    container_name: hr_system_celery_worker
    command: celery -A main.celery worker --loglevel=info
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/hr_system
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - hr_network
    restart: unless-stopped

  # Celery Beat (Scheduled Tasks)
  celery_beat:
    build: .
    container_name: hr_system_celery_beat
    command: celery -A main.celery beat --loglevel=info
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/hr_system
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - hr_network
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:

networks:
  hr_network:
    driver: bridge
