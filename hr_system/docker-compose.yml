version: '3.8'

services:
  # Backend API
  backend:
    build: ./backend
    container_name: hr_system_backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - REDIS_URL=redis://redis:6379
      - DEBUG=false
    depends_on:
      - redis
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    networks:
      - hr_network
    restart: unless-stopped

  # Frontend
  frontend:
    build: ./frontend-new
    container_name: hr_system_frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - hr_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hr_system_redis
    networks:
      - hr_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hr_system_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hr_network
    restart: unless-stopped

  # Celery Worker
  celery_worker:
    build: ./backend
    container_name: hr_system_celery_worker
    command: celery -A main.celery worker --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - REDIS_URL=redis://redis:6379
      - DEBUG=false
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    networks:
      - hr_network
    restart: unless-stopped

networks:
  hr_network:
    driver: bridge
